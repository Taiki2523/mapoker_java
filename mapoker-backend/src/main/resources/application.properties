spring.application.name=mapoker-backend

# Allow Flyway to baseline an existing schema that has no history table yet
spring.flyway.baseline-on-migrate=true

# CORS
cors.allowed-origin-patterns=*
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Session cookie security
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=Lax
server.forward-headers-strategy=framework

# Management endpoint used by Docker healthcheck
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Game defaults
game.default-odd-chip-rule=LOW_INDEX
game.default-player-name=Player
