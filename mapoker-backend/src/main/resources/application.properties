spring.application.name=mapoker-backend

# Allow Flyway to baseline an existing schema that has no history table yet
spring.flyway.baseline-on-migrate=true

# CORS
cors.allowed-origin-patterns=*
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Session cookie security
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=Lax
server.forward-headers-strategy=framework

# Management endpoint used by Docker healthcheck
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Game defaults
game.default-odd-chip-rule=LOW_INDEX
game.default-player-name=Player

# Wallet defaults
wallet.initial-grant=10000
wallet.daily-bonus-amount=1000
wallet.daily-bonus-cooldown-hours=24
wallet.recovery-threshold=1000
wallet.recovery-amount=5000
wallet.recovery-cooldown-hours=12
wallet.min-buyin-bb-multiplier=20
wallet.max-buyin-bb-multiplier=100
wallet.admin-usernames=
