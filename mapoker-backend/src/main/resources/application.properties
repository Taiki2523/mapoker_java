spring.application.name=mapoker-backend

# Allow Flyway to baseline an existing schema that has no history table yet
spring.flyway.baseline-on-migrate=true

# CORS
cors.allowed-origin-patterns=*
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Game defaults
game.default-odd-chip-rule=LOW_INDEX
game.default-player-name=Player
