spring.application.name=mapoker-backend
spring.application.version=@project.version@


# CORS
cors.allowed-origin-patterns=*
cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Session cookie security
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=Lax
server.forward-headers-strategy=framework

# Management endpoint used by Docker healthcheck
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Game defaults
game.default-odd-chip-rule=LOW_INDEX
game.default-player-name=Player

# Wallet defaults
wallet.initial-grant=10000
wallet.daily-bonus-amount=1000
wallet.daily-bonus-cooldown-hours=24
wallet.min-buyin-bb-multiplier=20
wallet.max-buyin-bb-multiplier=100
wallet.admin-usernames=

# Google OAuth2
google.client-id=${GOOGLE_CLIENT_ID:}

# Avatar storage
avatar.storage-path=${AVATAR_STORAGE_PATH:/data/uploads/avatars}

# Multipart upload limits
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
