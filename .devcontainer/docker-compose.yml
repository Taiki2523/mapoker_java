services:
  app:
    image: mcr.microsoft.com/devcontainers/java:1-21-bullseye
    volumes:
      - ..:/workspace:cached
      - maven-cache:/home/vscode/.m2
    command: sleep infinity
    depends_on:
      - db

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: mapoker
      POSTGRES_USER: mapoker
      POSTGRES_PASSWORD: mapoker
    volumes:
      - postgres-data:/var/lib/postgresql/data

  frontend:
    build:
      context: ../mapoker-frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE: http://app:8080
    ports:
      - "5173:5173"
    volumes:
      - ../mapoker-frontend:/app
      - /app/node_modules
    profiles:
      - frontend

volumes:
  maven-cache:
  postgres-data:
