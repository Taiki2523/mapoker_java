# Usage:
#   Local:  docker compose --env-file .env.local up -d
#   Prod:   docker compose --env-file .env.prd up -d

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: mapoker-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mapoker}
      POSTGRES_USER: ${POSTGRES_USER:-mapoker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ${DB_DATA_LOCATION:-/srv/mapoker/data/db}:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mapoker}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mapoker-network

  # Backend (Spring Boot)
  backend:
    image: ghcr.io/taiki2523/mapoker-backend:${APP_VERSION:-latest}
    build:
      context: ./mapoker-backend
      dockerfile: Dockerfile
    container_name: mapoker-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-mapoker}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-mapoker}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      SPRING_JPA_DATABASE: postgresql

      # Flyway
      SPRING_FLYWAY_ENABLED: "true"

      # Spring profiles
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-postgresql,production}

      # Server
      SERVER_PORT: 8080

      # Application settings
      GAME_DEFAULT_ODD_CHIP_RULE: ${GAME_DEFAULT_ODD_CHIP_RULE:-LOW_INDEX}
      GAME_DEFAULT_PLAYER_NAME: ${GAME_DEFAULT_PLAYER_NAME:-Player}

      # CORS settings
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      CORS_ALLOWED_METHODS: ${CORS_ALLOWED_METHODS:-GET,POST,PUT,DELETE,OPTIONS}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}

      # Google OAuth (if using production auth)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mapoker-network

  # Frontend (React/Vite + nginx)
  frontend:
    image: ghcr.io/taiki2523/mapoker-frontend:${APP_VERSION:-latest}
    build:
      context: ./mapoker-frontend
      dockerfile: Dockerfile
      args:
        APPLICATION_URL: ${APPLICATION_URL:-http://localhost:3000}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_APP_ENV: ${VITE_APP_ENV:-production}
    container_name: mapoker-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - mapoker-network

networks:
  mapoker-network:
    driver: bridge
